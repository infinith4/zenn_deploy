<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <!-- Clip metal gradient -->
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0"/>
      <stop offset="50%" style="stop-color:#a0a0a0"/>
      <stop offset="100%" style="stop-color:#888888"/>
    </linearGradient>
    <!-- Board body gradient -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="100%" style="stop-color:#efefef"/>
    </linearGradient>
    <!-- Green dot glow -->
    <radialGradient id="dotGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#6fdd6f"/>
      <stop offset="100%" style="stop-color:#28a828"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- ── Clipboard body ── -->
  <!-- Red border frame -->
  <rect x="8" y="14" width="78" height="82" rx="7" ry="7"
        fill="#d32020" filter="url(#shadow)"/>
  <!-- White inner paper -->
  <rect x="13" y="19" width="68" height="72" rx="4" ry="4"
        fill="url(#boardGrad)"/>

  <!-- ── Metal clip ── -->
  <!-- Clip arch (top curved part) -->
  <path d="M38,18 Q38,4 50,4 Q62,4 62,18"
        fill="none" stroke="url(#clipGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Clip base bar -->
  <rect x="30" y="10" width="40" height="10" rx="3" ry="3"
        fill="url(#clipGrad)"/>
  <!-- Clip highlight -->
  <rect x="30" y="10" width="40" height="4" rx="3" ry="3"
        fill="#e0e0e0" opacity="0.5"/>
  <!-- Clip screw dots -->
  <circle cx="42" cy="15" r="2" fill="#777"/>
  <circle cx="58" cy="15" r="2" fill="#777"/>

  <!-- ── Letter "p" ── -->
  <text x="50" y="65"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="36"
        fill="#333333"
        text-anchor="middle"
        dominant-baseline="middle">p</text>

  <!-- ── Gear icon ── -->
  <g transform="translate(24,76)">
    <!-- Gear teeth via polygon -->
    <polygon points="
      0,-11  3,-8
      8,-10  8,-6
      11,0   8,3
      8,10   3,8
      0,11  -3,8
      -8,10 -8,6
      -11,0 -8,-3
      -8,-10 -3,-8"
      fill="#555555"/>
    <!-- Gear center hole -->
    <circle cx="0" cy="0" r="4.5" fill="#efefef"/>
  </g>

  <!-- ── Green active dot ── -->
  <!-- White ring -->
  <circle cx="38" cy="83" r="7" fill="white"/>
  <!-- Green dot -->
  <circle cx="38" cy="83" r="5.5" fill="url(#dotGrad)"/>
</svg>
